name: Release & Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write  # Mandatory for OIDC trusted publishing to PyPI

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # 1. Manage releases via Google Release Please
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: python

      # 2. Build and publish to PyPI ONLY when a release is created
      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Setup uv
        if: ${{ steps.release.outputs.release_created }}
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distribution packages
        if: ${{ steps.release.outputs.release_created }}
        run: uv build

      - name: Publish package to PyPI
        if: ${{ steps.release.outputs.release_created }}
        uses: pypa/gh-action-pypi-publish@release/v1
